# Controlled vocabulary — the topics, symptoms, and interventions menowise
# entries organize around (schema: schema/entities.schema.json). Curated,
# low churn. gn_info_records references these ids and never invents them; an
# entry's `kind` must match its entity's `kind`. These are navigation labels,
# not clinical claims. Propose additions by PR.

