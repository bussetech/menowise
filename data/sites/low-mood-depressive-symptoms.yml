id: low-mood-depressive-symptoms
title: "Low mood and depressive symptoms in menopause"
kind: symptom
summary: "The SWAN cohort reports higher odds of clinically significant depressive symptoms during perimenopause and early postmenopause than premenopause (roughly 1.5x or more, highest in late perimenopause); premenopausal women with no depression history were about twice as likely to develop significant depressive symptoms on entering perimenopause, and associations persisted after accounting for psychosocial and health factors. NICE NG23 describes considering HRT and/or CBT for low mood associated with menopause, and reports that SSRIs/SNRIs have not been shown to ease low mood in the absence of a diagnosis of depression."
evidence_strength: limited
status: published
