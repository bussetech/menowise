id: menstrual-cycle-changes
title: "Menstrual cycle changes in perimenopause"
kind: symptom
summary: "STRAW+10 consensus staging defines early perimenopause by a persistent difference of >=7 days in the length of consecutive menstrual cycles, and late perimenopause by an interval of >=60 days of amenorrhea; changes in menstrual cycle length are typically the first clinically recognizable sign of the transition."
evidence_strength: insufficient
