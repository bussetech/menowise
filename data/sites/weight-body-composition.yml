id: weight-body-composition
title: "Weight and body-composition change in menopause"
kind: symptom
summary: "The SWAN cohort reports that around the start of the menopause transition the rate of fat gain roughly doubled and lean mass declined, continuing until about 2 years after the final menstrual period. Visceral (abdominal) fat increases over the transition and is an independent predictor of metabolic syndrome, diabetes, and cardiovascular disease."
evidence_strength: limited
status: published
