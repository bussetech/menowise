id: skin-hair-changes
title: "Skin and hair changes in menopause"
kind: symptom
summary: "A Climacteric (2022) review reports that estrogen supports skin collagen, and that after menopause skin collagen content declines (reported around 2% per year, with larger losses in the first years), reducing elasticity and hydration, while hair may thin (diffuse effluvium / female-pattern changes). Some studies report that HRT partially improves skin thickness/collagen when started near menopause onset."
evidence_strength: limited
status: published
