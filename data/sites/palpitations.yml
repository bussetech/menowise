id: palpitations
title: "Heart palpitations in menopause"
kind: symptom
summary: "A scoping review reports palpitations affecting up to about 42% of perimenopausal and 54% of postmenopausal women. Hormonal changes are implicated, but menopause-specific causal evidence is limited and more research is needed."
