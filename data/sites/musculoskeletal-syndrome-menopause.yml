id: musculoskeletal-syndrome-menopause
title: "Joint and muscle pain (musculoskeletal syndrome of menopause)"
kind: symptom
summary: "The 'musculoskeletal syndrome of menopause' is described (Climacteric 2024) as a cluster of musculoskeletal symptoms — arthralgia, loss of muscle mass, reduced bone density, and osteoarthritis progression — linked to estrogen decline, and estimated to affect roughly 70% of women in the transition. In support of estrogen's role, aromatase inhibitors, which sharply lower estrogen, cause new or worsening joint pain in about half of women who take them."
evidence_strength: limited
status: published
