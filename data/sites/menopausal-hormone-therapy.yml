id: menopausal-hormone-therapy
title: "Menopausal hormone therapy"
kind: intervention
summary: >-
  Menopausal hormone therapy (MHT; also called HRT or hormone replacement
  therapy) is addressed in The Menopause Society's 2022 Hormone Therapy
  Position Statement, which reports that hormone therapy remains the most
  effective treatment for vasomotor symptoms and the genitourinary syndrome of
  menopause and has been shown to prevent bone loss and fracture. The statement
  reports that for women younger than 60 years or within 10 years of menopause
  onset and without contraindications, the benefit-risk ratio is favorable for
  treating bothersome VMS and preventing bone loss. It also reports that for
  women who initiate hormone therapy more than 10 years from menopause onset or
  who are older than 60, the benefit-risk ratio appears less favorable, with
  greater absolute risks of coronary heart disease, stroke, venous
  thromboembolism, and dementia. This entry summarizes what the literature
  reports for navigation and is not medical advice.
evidence_strength: moderate
status: published
sources:
  - url: https://journals.lww.com/menopausejournal/fulltext/2022/07000/the_2022_hormone_therapy_position_statement_of_the.4.aspx
    title: "The Menopause Society — 2022 Hormone Therapy Position Statement (Menopause, 2022)"
    publisher: The Menopause Society (Menopause journal)
    date: "2022"
    note: "Effectiveness for VMS/GSM and bone; timing-dependent benefit-risk (early vs. late initiation)."
