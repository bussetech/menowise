value: "Odds of clinically significant depressive symptoms were higher during perimenopause and early postmenopause than premenopause (roughly 1.5x or more, highest in late perimenopause); premenopausal women with no depression history entering perimenopause were about twice as likely to develop significant depressive symptoms; associations persisted after accounting for psychosocial and health factors."
