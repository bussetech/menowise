value: "Recommended for vasomotor symptoms at Level I evidence (good and consistent scientific evidence): cognitive-behavioral therapy, clinical hypnosis, SSRIs/SNRIs, gabapentin, and fezolinetant (a neurokinin 3 receptor antagonist, first-in-class FDA-approved). Oxybutynin recommended at Levels I-II; weight loss and stellate ganglion block at Levels II-III."
